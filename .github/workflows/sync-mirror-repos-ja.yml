name: Sync Japanese Articles to Mirror Repos

on:
  push:
    branches: [ "main" ]
    paths:
      - "articles/*-ja.md"

jobs:
  sync-mirrors-ja:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Detect changed JP articles
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '\-ja.md$' || true)
          echo "changed_files=$CHANGED" >> $GITHUB_OUTPUT

      - name: Sync JP articles to mirror repos
        if: steps.changed.outputs.changed_files != ''
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          node scripts/sync-mirror-repos.js "${{ steps.changed.outputs.changed_files }}"
