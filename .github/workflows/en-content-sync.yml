name: EN Content Sync (Qiita)

on:
  push:
    branches: [ "main" ]
    paths:
      - "articles/*-en.md"

jobs:
  en-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Detect changed EN articles (event payload)
        id: detect_event
        run: |
          CHANGED=$(jq -r '.commits[].modified[], .commits[].added[]' "$GITHUB_EVENT_PATH" | grep '\-en.md$' | tr '\n' ' ' || true)
          echo "changed_files=$CHANGED" >> $GITHUB_OUTPUT

      - name: Fallback detect EN articles
        if: steps.detect_event.outputs.changed_files == ''
        id: detect_fallback
        run: |
          CHANGED=$(git ls-files "articles/*-en.md" | tr '\n' ' ' || true)
          echo "changed_files=$CHANGED" >> $GITHUB_OUTPUT

      - name: Post EN articles to Qiita
        if: steps.detect_event.outputs.changed_files != '' || steps.detect_fallback.outputs.changed_files != ''
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
        run: |
          FILES="${{ steps.detect_event.outputs.changed_files }}${{ steps.detect_fallback.outputs.changed_files }}"
          for file in $FILES; do
            echo "Posting EN article to Qiita: $file"
            npx tsx scripts/qiita-post.ts "$file"
            sleep 2
          done

      - name: Commit updated mapping.yml
        if: steps.detect_event.outputs.changed_files != '' || steps.detect_fallback.outputs.changed_files != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/mapping.yml
          git diff --cached --quiet || git commit -m "chore: update mapping.yml with Qiita IDs [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main

      - name: Sync EN articles to mirror repos
        if: steps.detect_event.outputs.changed_files != '' || steps.detect_fallback.outputs.changed_files != ''
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MIRROR_REPOS: |
            riadraz/x-engineer:/docs/
        run: |
          FILES="${{ steps.detect_event.outputs.changed_files }}${{ steps.detect_fallback.outputs.changed_files }}"
          node scripts/sync-mirror-repos.js "$FILES" "$MIRROR_REPOS"
