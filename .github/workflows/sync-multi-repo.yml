name: Sync articles to mirror repos

on:
  push:
    branches: [ "main" ]
    paths:
      - "articles/*.md"

jobs:
  sync-mirrors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Determine changed articles
        id: changed
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep '^articles/' || true)
          echo "changed_files=$CHANGED_FILES" >> $GITHUB_OUTPUT

      - name: Sync to mirror repos
        if: steps.changed.outputs.changed_files != ''
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          node scripts/sync-mirror-repos.js "${{ steps.changed.outputs.changed_files }}"
