name: Sync Japanese Articles to Zenn

on:
  push:
    branches: [ "main" ]
    paths:
      - "articles/*-ja.md"

jobs:
  sync-zenn-ja:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy JP articles to Zenn folder
        run: |
          mkdir -p zenn/articles
          for file in $(ls articles/*-ja.md); do
            cp "$file" "zenn/articles/"
          done

      - name: Commit JP-only Zenn sync
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add zenn/articles
          git commit -m "Sync JP articles to Zenn" || echo "No changes"
          git push
