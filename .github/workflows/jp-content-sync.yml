name: JP Content Sync (Qiita + Zenn + Multi-Repo)

on:
  push:
    branches: [ "main" ]
    paths:
      - "articles/*-ja.md"

jobs:
  jp-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Detect changed JP articles
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '\-ja.md$' || true)
          echo "changed_files=$CHANGED" >> $GITHUB_OUTPUT

      # -----------------------------
      #  Qiita JP-only publishing
      # -----------------------------
      - name: Post JP articles to Qiita
        if: steps.changed.outputs.changed_files != ''
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
        run: |
          for file in ${{ steps.changed.outputs.changed_files }}; do
            echo "Posting JP article to Qiita: $file"
            npx ts-node scripts/qiita-post.ts "$file"
          done

      # -----------------------------
      #  Zenn JP-only sync (GitHub連携)
      # -----------------------------
      - name: Notify Zenn auto-sync
        if: steps.changed.outputs.changed_files != ''
        run: |
          echo "JP article updated. Zenn will auto-sync via GitHub連携."

      # -----------------------------
      #  Multi-repo JP-only sync
      # -----------------------------
      - name: Sync JP articles to mirror repos
        if: steps.changed.outputs.changed_files != ''
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          node scripts/sync-mirror-repos.js "${{ steps.changed.outputs.changed_files }}"
